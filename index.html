<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:700px;
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,.08);
    text-align:center;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#e5e5e5;
    margin:auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
}

h1{
    margin-top:20px;
    color:#333;
}

.subtitle{
    color:#777;
    margin:10px 0 30px;
}

.info{
    text-align:left;
    line-height:2;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    background:#222;
    color:white;
    padding:12px 22px;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    transition:all .3s ease;
}

button:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,.18);
}

.card{
    margin-top:30px;
    background:#fafafa;
    border-radius:15px;
    padding:25px;
    text-align:left;
    display:none;
    animation:fade .3s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

footer{
    margin-top:35px;
    color:#888;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="profile">👤</div>

<h1>นายพีระพงศ์ สมวงค์</h1>
<p class="subtitle">นักศึกษาสาขาวิศวกรรมคอมพิวเตอร์ ชั้นปีที่ 2</p>

<div class="info">
<b>ชื่อ:</b> นายพีระพงศ์ สมวงค์<br>
<b>สาขา:</b> วิศวกรรมคอมพิวเตอร์<br>
<b>ชั้นปี:</b> ปี 2
</div>

<div class="buttons">
<button onclick="showInfo('hobby')">งานอดิเรก</button>
<button onclick="showInfo('like')">สิ่งที่ชอบ</button>
<button onclick="showInfo('food')">อาหารที่ชอบ</button>
<button onclick="showInfo('skill')">ความถนัด</button>
</div>

<div id="card" class="card"></div>

<footer>
Minimal Profile © 2026
</footer>

</div>

<script>

const data = {

hobby:
`<h2>🎯 งานอดิเรก</h2>
<p>
• ฟังเพลง<br>
• ดูหนัง<br>
• เล่นเกม<br>
• ศึกษาเทคโนโลยีใหม่ ๆ
</p>`,

like:
`<h2>❤️ สิ่งที่ชอบ</h2>
<p>
• คอมพิวเตอร์<br>
• การเขียนโปรแกรม<br>
• เทคโนโลยี AI<br>
• การเรียนรู้สิ่งใหม่
</p>`,

food:
`<h2>🍜 อาหารที่ชอบ</h2>
<p>
• กะเพรา<br>
• หมูกระทะ<br>
• ชาบู<br>
• ซูชิ
</p>`,

skill:
`<h2>💻 ความถนัด</h2>
<p>
• HTML / CSS<br>
• เขียนโปรแกรมเบื้องต้น<br>
• แก้ไขปัญหาคอมพิวเตอร์<br>
• ทำงานเป็นทีม
</p>`
};

function showInfo(type){
    const card=document.getElementById("card");
    card.style.display="block";
    card.innerHTML=data[type];
}

</script>

</body>
</html>
