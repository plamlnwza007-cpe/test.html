<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประวัติส่วนตัว</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Tahoma, sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:#fff;
    width:360px;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
}

.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#e0e0e0;
    margin:0 auto 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:40px;
    color:#777;
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

.info{
    text-align:left;
    line-height:2;
    font-size:16px;
}

.info span{
    font-weight:bold;
}

footer{
    margin-top:25px;
    color:#999;
    font-size:14px;
}
</style>

</head>
<body>

<div class="card">

    <div class="profile">
        👤
    </div>

    <h1>นายพีระพงศ์ สมวงค์</h1>
    <p class="subtitle">Computer Engineering Student</p>

    <div class="info">
        <p><span>ชื่อ:</span> นายพีระพงศ์ สมวงค์</p>
        <p><span>สาขา:</span> วิศวกรรมคอมพิวเตอร์</p>
        <p><span>ชั้นปี:</span> ปี 2</p>
        <p><span>สถานะ:</span> กำลังศึกษา</p>
    </div>

    <footer>
        Minimal Portfolio © 2026
    </footer>

</div>

</body>
</html>
